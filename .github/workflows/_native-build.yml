name: _Native Build

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""
      upload-artifacts:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.config.os }}${{ matrix.target.name }}
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: windows,
              os: windows-2025-vs2026,
              artifact: infomap-win,
              binary: Infomap.exe,
              cxxflags: -static,
              ldflags: -static,
              compiler: g++,
              test_extra_args: "CMAKE_GENERATOR=Ninja",
            }
          - {
              name: ubuntu,
              os: ubuntu-24.04,
              artifact: infomap-ubuntu,
              binary: Infomap,
              cxxflags: "",
              ldflags: "",
              compiler: g++,
              test_extra_args: "",
            }
          - {
              name: macos,
              os: macos-15,
              artifact: infomap-mac,
              binary: Infomap,
              cxxflags: "",
              ldflags: "",
              compiler: clang++,
              test_extra_args: "",
            }
        target:
          - { name: "", openmp: "1" }
          - { name: "-noomp", openmp: "0" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Configure macOS OpenMP environment
        if: startsWith(matrix.config.os, 'macos')
        run: |
          brew install libomp
          make ci-export-github-env >> "$GITHUB_ENV"

      # Windows native CI uses MinGW g++ without ccache; the action no-ops there.
      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: native-${{ matrix.config.name }}-omp${{ matrix.target.openmp }}

      - name: Install Python test helpers
        run: python -m pip install --upgrade "jsonschema>=4.18" referencing
        shell: bash

      - name: Build native binary
        run: |
          make -j build-native OPENMP=${{ matrix.target.openmp }}
          command -v ccache >/dev/null 2>&1 && ccache -s || true
        shell: bash
        env:
          CXX: ${{ matrix.config.compiler }}
          CXXFLAGS: ${{ matrix.config.cxxflags }} ${{ env.CPPFLAGS }}
          LDFLAGS: ${{ matrix.config.ldflags }} ${{ env.LDFLAGS }}

      - name: Smoke test binary
        run: ./Infomap --version
        shell: bash

      - name: Run C++ tests
        if: matrix.target.name == ''
        run: make test-native CMAKE_CXX_COMPILER=${{ matrix.config.compiler }} TEST_CMAKE_ARGS="-DPython3_EXECUTABLE=$(python -c 'from pathlib import Path; import sys; print(Path(sys.executable).as_posix())')" ${{ matrix.config.test_extra_args }}
        shell: bash
        env:
          CXX: ${{ matrix.config.compiler }}
          CXXFLAGS: ${{ matrix.config.cxxflags }} ${{ env.CPPFLAGS }}
          LDFLAGS: ${{ matrix.config.ldflags }} ${{ env.LDFLAGS }}

      - name: Run C++ tests with experimental features
        if: matrix.target.name == '' && matrix.config.name == 'ubuntu'
        run: make test-native FEATURES="lossy-map-equation regularized-multilayer" CMAKE_TEST_BUILD_DIR=build/cmake-features CMAKE_CXX_COMPILER=${{ matrix.config.compiler }} TEST_CMAKE_ARGS="-DPython3_EXECUTABLE=$(python -c 'from pathlib import Path; import sys; print(Path(sys.executable).as_posix())')" ${{ matrix.config.test_extra_args }}
        shell: bash
        env:
          CXX: ${{ matrix.config.compiler }}
          CXXFLAGS: ${{ matrix.config.cxxflags }} ${{ env.CPPFLAGS }}
          LDFLAGS: ${{ matrix.config.ldflags }} ${{ env.LDFLAGS }}

      - name: Package binary
        if: inputs.upload-artifacts
        run: 7z a ${{ matrix.config.artifact }}${{ matrix.target.name }}.zip ${{ matrix.config.binary }}
        shell: bash

      - name: Upload packaged binary
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.config.artifact }}${{ matrix.target.name }}
          path: ./${{ matrix.config.artifact }}${{ matrix.target.name }}.zip
          retention-days: 7
