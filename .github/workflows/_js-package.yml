name: _JavaScript Package

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""
      run-tests:
        required: false
        type: boolean
        default: true
      pack-artifact:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up JavaScript build
        uses: ./.github/actions/setup-js-build

      - name: Install Playwright browser
        if: inputs.run-tests
        run: npx playwright install --with-deps chromium

      - name: Verify JavaScript metadata freshness
        if: inputs.run-tests
        run: make test-js-metadata

      - name: Verify binding option freshness
        if: inputs.run-tests
        run: make test-binding-options-freshness

      - name: Build JavaScript worker
        if: ${{ !inputs.run-tests }}
        run: make -j build-js

      - name: Run JavaScript verification
        if: inputs.run-tests
        run: make test-js

      - name: Pack npm artifact
        if: inputs.pack-artifact
        run: |
          npm pack --json dist/npm/package > dist/npm/npm-pack.json
          pkg="$(node --input-type=module -e "import fs from 'node:fs'; const [entry] = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(entry.filename);" dist/npm/npm-pack.json)"
          mkdir -p dist/npm
          mv "$pkg" dist/npm/

      - name: Upload npm package artifact
        if: inputs.pack-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: dist/npm/*.tgz
          retention-days: 7
