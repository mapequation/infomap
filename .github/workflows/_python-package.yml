name: _Python Package

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""
      run-tests:
        required: false
        type: boolean
        default: true
      mode:
        required: false
        type: string
        default: full
      run-swig-freshness:
        required: false
        type: boolean
        default: true
      run-release-smoke:
        required: false
        type: boolean
        default: true
      build-release-artifacts:
        required: false
        type: boolean
        default: false
      features:
        required: false
        type: string
        default: ""
      prerelease-python-check:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  # Single source of truth for the macOS deployment target used by the
  # cibuildwheel jobs below. Keep in sync with mk/ci.mk (ci-export-github-env),
  # which sets the same value for the make-based macOS builds.
  MACOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  swig-freshness:
    if: inputs.run-tests && (inputs.mode == 'full' || inputs.run-swig-freshness)
    name: Python SWIG freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Cache SWIG 4.4.1 install
        id: swig-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.tool_cache }}/swig/4.4.1/${{ runner.arch }}
          key: swig-4.4.1-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Install SWIG 4.4.1
        if: steps.swig-cache.outputs.cache-hit != 'true'
        run: |
          swig_prefix="$RUNNER_TOOL_CACHE/swig/4.4.1/$RUNNER_ARCH"
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl build-essential libpcre2-dev
          curl -L --retry 3 --output /tmp/swig.tar.gz \
            https://downloads.sourceforge.net/project/swig/swig/swig-4.4.1/swig-4.4.1.tar.gz
          mkdir -p /tmp/swig-src
          tar -xzf /tmp/swig.tar.gz -C /tmp/swig-src --strip-components=1
          cd /tmp/swig-src
          ./configure --prefix="$swig_prefix"
          make -j"$(nproc)"
          make install

      - name: Add SWIG to PATH
        run: echo "$RUNNER_TOOL_CACHE/swig/4.4.1/$RUNNER_ARCH/bin" >> "$GITHUB_PATH"

      - name: Verify SWIG version
        run: swig -version

      - name: Verify tracked SWIG outputs
        run: make test-python-swig-freshness

  tests-quick:
    if: ${{ always() && inputs.run-tests && inputs.mode == 'quick' && (needs.swig-freshness.result == 'success' || needs.swig-freshness.result == 'skipped') }}
    name: Python ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: swig-freshness
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.14"
            smoke-only: false
          - os: windows-2025-vs2026
            python-version: "3.14"
            smoke-only: true

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: ${{ matrix.python-version }}
          install-build-tooling: "true"

      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: python-${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      # The editable install is the test legs' only compile: it builds the
      # extension in-place, so the .so lands in the source tree where the
      # doctests import it from. A separate `make build-python` wheel build used
      # to run first and recompile the same extension -- redundant in the test
      # legs (the wheel is unused here; wheel-build health is covered by the
      # release-smoke and release wheel jobs).
      # Route pip through uv (UV_SYSTEM_PYTHON installs into the setup-python
      # environment): far faster resolution and a hardlinked cache for the heavy
      # test/examples extras. The in-place compile of the extension is unchanged.
      - name: Install editable package
        run: |
          make dev-python-install PIP="uv pip"
          command -v ccache >/dev/null 2>&1 && ccache -s || true
        env:
          FEATURES: ${{ inputs.features }}
          # docs (sphinx/furo) is only needed by build-docs, not the test jobs.
          PYTHON_DEV_EXTRAS: test,examples
          UV_SYSTEM_PYTHON: "1"

      - name: Run Python smoke test
        if: matrix.smoke-only
        run: |
          python - <<'PY'
          import os
          from infomap import Infomap, build_info
          print(Infomap(silent=True).num_top_modules)
          features = os.environ.get("INFOMAP_EXPECTED_FEATURES", "")
          if "regularized-multilayer" in features.replace(",", " ").split():
              assert "regularized-multilayer" in build_info()["enabled_features"]
          PY
        env:
          INFOMAP_EXPECTED_FEATURES: ${{ inputs.features }}

      - name: Run Python unit tests
        if: ${{ !matrix.smoke-only }}
        run: make test-python-unit

      # Cheap (~1 s) and the only guard keeping docstring examples in sync
      # with the bundled example networks, so quick mode runs it too.
      - name: Run Python doctests
        if: ${{ !matrix.smoke-only }}
        run: make test-python-doctest

      # Deterministic core-scope gate (io/ and tl/ excluded); mirrors the
      # pre-push hook. Full-scope pyright stays a manual check because its
      # diagnostics vary with installed optional deps.
      - name: Type check Python core surface
        if: ${{ !matrix.smoke-only }}
        run: make test-python-typecheck-core

  tests-full:
    if: ${{ always() && inputs.run-tests && inputs.mode == 'full' && (needs.swig-freshness.result == 'success' || needs.swig-freshness.result == 'skipped') }}
    name: Python ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: swig-freshness
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.11"
            smoke-only: false
            run-full-suite: false
          - os: ubuntu-24.04
            python-version: "3.12"
            smoke-only: false
            run-full-suite: false
          - os: ubuntu-24.04
            python-version: "3.13"
            smoke-only: false
            run-full-suite: false
          - os: ubuntu-24.04
            python-version: "3.14"
            smoke-only: false
            run-full-suite: true
          - os: windows-2025-vs2026
            python-version: "3.14"
            smoke-only: true
            run-full-suite: false

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: ${{ matrix.python-version }}
          install-build-tooling: "true"

      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: python-${{ matrix.os }}-py${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      # The editable install is the test legs' only compile: it builds the
      # extension in-place, so the .so lands in the source tree where the
      # doctests import it from. A separate `make build-python` wheel build used
      # to run first and recompile the same extension -- redundant in the test
      # legs (the wheel is unused here; wheel-build health is covered by the
      # release-smoke and release wheel jobs).
      # Route pip through uv (UV_SYSTEM_PYTHON installs into the setup-python
      # environment): far faster resolution and a hardlinked cache for the heavy
      # test/examples extras. The in-place compile of the extension is unchanged.
      - name: Install editable package
        run: |
          make dev-python-install PIP="uv pip"
          command -v ccache >/dev/null 2>&1 && ccache -s || true
        env:
          FEATURES: ${{ inputs.features }}
          # docs (sphinx/furo) is only needed by build-docs, not the test jobs.
          PYTHON_DEV_EXTRAS: test,examples
          UV_SYSTEM_PYTHON: "1"

      - name: Run Python smoke test
        if: matrix.smoke-only
        run: |
          python - <<'PY'
          import os
          from infomap import Infomap, build_info
          print(Infomap(silent=True).num_top_modules)
          features = os.environ.get("INFOMAP_EXPECTED_FEATURES", "")
          if "regularized-multilayer" in features.replace(",", " ").split():
              assert "regularized-multilayer" in build_info()["enabled_features"]
          PY
        env:
          INFOMAP_EXPECTED_FEATURES: ${{ inputs.features }}

      - name: Run Python unit tests
        if: ${{ !matrix.smoke-only }}
        run: make test-python-unit

      - name: Run Python doctests
        if: matrix.run-full-suite
        run: make test-python-doctest

      # Full scope including the io/ and tl/ integration adapters. The
      # [test]+[examples] extras installed above pin the optional-dep set and
      # pyright is version-pinned, so the diagnostics are reproducible here.
      - name: Type check Python package
        if: matrix.run-full-suite
        run: make test-python-typecheck

      - name: Run Python example smoke tests
        if: matrix.run-full-suite
        run: make test-python-examples

  release-smoke:
    if: inputs.run-tests && !inputs.build-release-artifacts && (inputs.mode == 'full' || inputs.run-release-smoke)
    name: Python release smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"
          install-build-tooling: "true"

      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: python-release-smoke-${{ runner.os }}

      - name: Build release distributions
        run: |
          make release-python-dist
          command -v ccache >/dev/null 2>&1 && ccache -s || true
        env:
          FEATURES: ${{ inputs.features }}

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-wheel-smoke
          . .venv-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/python/*.whl
          python - <<'PY'
          import os
          from infomap import Infomap, build_info
          print(Infomap(silent=True).num_top_modules)
          features = os.environ.get("INFOMAP_EXPECTED_FEATURES", "")
          if "regularized-multilayer" in features.replace(",", " ").split():
              assert "regularized-multilayer" in build_info()["enabled_features"]
          PY
        shell: bash
        env:
          INFOMAP_EXPECTED_FEATURES: ${{ inputs.features }}

      - name: Smoke test built sdist
        run: |
          python -m venv .venv-sdist-smoke
          . .venv-sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/python/*.tar.gz
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY
        shell: bash
        env:
          FEATURES: ${{ inputs.features }}

  sdist:
    if: inputs.build-release-artifacts && inputs.features == ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"
          install-build-tooling: "true"

      - name: Build sdist
        run: python -m build --sdist --outdir dist/python .

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sdist
          path: dist/python/*.tar.gz
          retention-days: 7

  build-wheels:
    if: inputs.build-release-artifacts
    name: Python wheel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025-vs2026, macos-15]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Install Python release tooling
        run: |
          # cibuildwheel is single-sourced from the pyproject release extra
          # (bumped by dependabot); read it here instead of a duplicate pin.
          cibw="$(python -c 'import tomllib; print(next(r for r in tomllib.load(open("pyproject.toml","rb"))["project"]["optional-dependencies"]["release"] if r.startswith("cibuildwheel==")))')"
          python -m pip install build "$cibw" twine wheel

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: brew install libomp

      # cibuildwheel recompiles the whole C++ core once per Python version
      # (cp311-cp314) with no cross-version or cross-run cache. sccache + the
      # GitHub Actions cache backend fixes that on every platform: unix wraps the
      # compiler through CXX, Windows through setup.py's MSVC launcher (cl.exe
      # ignores CXX). sccache runs the real compiler underneath, so a cache miss
      # or an unavailable backend just means no speedup -- never a failed build.
      # The action's post step prints cache stats.
      - name: Set up sccache
        if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'windows')
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # The nested cl.exe compiles (cibuildwheel -> pip -> setup.py) spawn the
      # sccache server too late and silently fall back to plain cl if it is not
      # already running in the GHA-cache env, so start it explicitly at the top
      # level. sccache-action exports the ACTIONS_* tokens but not the enable
      # flag, so set that here.
      - name: Start sccache server (Windows)
        if: startsWith(matrix.os, 'windows')
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: sccache --start-server

      - name: Build wheels
        run: python -m cibuildwheel . --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_COMMAND: >-
            python -c "from infomap import Infomap, build_info; print(Infomap(silent=True).num_top_modules); assert ('regularized-multilayer' not in '${{ inputs.features }}'.replace(',', ' ').split()) or ('regularized-multilayer' in build_info()['enabled_features'])"
          CIBW_ENVIRONMENT: >-
            FEATURES="${{ inputs.features }}"
          # Linux builds in the manylinux container: install sccache in it, wrap
          # the compiler, and pass the GitHub Actions cache tokens (exported on
          # the host by sccache-action) through so the in-container sccache uses
          # the same GHA cache as macOS.
          # Arch-aware: uname -m is x86_64 on ubuntu-24.04 and aarch64 on the
          # ubuntu-24.04-arm native runner, matching sccache's musl asset names.
          CIBW_BEFORE_ALL_LINUX: >-
            sccache_arch="$(uname -m)"
            && curl -fsSL -o /tmp/sccache.tar.gz
            "https://github.com/mozilla/sccache/releases/download/v0.16.0/sccache-v0.16.0-${sccache_arch}-unknown-linux-musl.tar.gz"
            && tar -xzf /tmp/sccache.tar.gz -C /tmp
            && install -m 0755 "/tmp/sccache-v0.16.0-${sccache_arch}-unknown-linux-musl/sccache" /usr/local/bin/sccache
          CIBW_ENVIRONMENT_LINUX: >-
            CXX="sccache g++"
            SCCACHE_GHA_ENABLED=true
            FEATURES="${{ inputs.features }}"
          CIBW_ENVIRONMENT_PASS_LINUX: >-
            ACTIONS_CACHE_SERVICE_V2
            ACTIONS_RESULTS_URL
            ACTIONS_RUNTIME_TOKEN
          CIBW_ENVIRONMENT_MACOS: >-
            CXX="sccache /usr/bin/clang++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_CACHE_SERVICE_V2="$ACTIONS_CACHE_SERVICE_V2"
            ACTIONS_RESULTS_URL="$ACTIONS_RESULTS_URL"
            ACTIONS_RUNTIME_TOKEN="$ACTIONS_RUNTIME_TOKEN"
            FEATURES="${{ inputs.features }}"
            MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_DEPLOYMENT_TARGET }}
            CPPFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"
          # cl.exe ignores CXX, so route it through sccache with setup.py's MSVC
          # launcher instead. Tokens are expanded by cibuildwheel from the host
          # env (exported by sccache-action); SCCACHE_GHA_ENABLED is set here.
          CIBW_ENVIRONMENT_WINDOWS: >-
            INFOMAP_MSVC_COMPILER_LAUNCHER=sccache
            SCCACHE_GHA_ENABLED=true
            ACTIONS_CACHE_SERVICE_V2="$ACTIONS_CACHE_SERVICE_V2"
            ACTIONS_RESULTS_URL="$ACTIONS_RESULTS_URL"
            ACTIONS_RUNTIME_TOKEN="$ACTIONS_RUNTIME_TOKEN"
            FEATURES="${{ inputs.features }}"

      - name: Patch macOS OpenMP wheel loading
        if: startsWith(matrix.os, 'macos')
        run: python scripts/patch_macos_torch_libomp_rpath.py wheelhouse/*.whl

      # Excludes linux-aarch64: PyTorch's aarch64 Linux wheels lag on the newest
      # CPython, and cibuildwheel's own CIBW_TEST_COMMAND already imports and
      # smoke-tests every built wheel (including aarch64) inside the container.
      - name: Smoke test wheel with PyTorch
        if: matrix.os != 'ubuntu-24.04-arm'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          wheel_pattern="wheelhouse/infomap-*-cp314-cp314-*.whl"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            wheel_pattern="wheelhouse/infomap-*-cp314-cp314-win_amd64.whl"
          fi
          # shellcheck disable=SC2086
          python -m pip install $wheel_pattern pytest torch
          python -m pytest test/python/test_torch_interop.py

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 7

  prerelease-wheels:
    # Non-blocking early warning: test-build wheels against prerelease CPython
    # (3.15) so C-API / build breakage surfaces before the final release. Does
    # not publish and is not part of the release path.
    if: inputs.prerelease-python-check
    name: Python prerelease wheel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025-vs2026, macos-15]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Install cibuildwheel
        run: |
          # Single-sourced from the pyproject release extra (see build-wheels).
          cibw="$(python -c 'import tomllib; print(next(r for r in tomllib.load(open("pyproject.toml","rb"))["project"]["optional-dependencies"]["release"] if r.startswith("cibuildwheel==")))')"
          python -m pip install "$cibw"

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: brew install libomp

      # See the release build-wheels job: cache the C++ compiles via sccache on
      # every platform. Mirrored here so the (non-publishing) Python prerelease
      # check exercises the same sccache wiring before it reaches a real release.
      - name: Set up sccache
        if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'ubuntu') || startsWith(matrix.os, 'windows')
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Start sccache server (Windows)
        if: startsWith(matrix.os, 'windows')
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: sccache --start-server

      - name: Build prerelease wheels
        run: python -m cibuildwheel . --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp315-*"
          CIBW_ENABLE: cpython-prerelease
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_COMMAND: >-
            python -c "from infomap import Infomap; print(Infomap(silent=True).num_top_modules)"
          # See the release build-wheels job: sccache in the manylinux container.
          # Arch-aware: uname -m is x86_64 on ubuntu-24.04 and aarch64 on the
          # ubuntu-24.04-arm native runner, matching sccache's musl asset names.
          CIBW_BEFORE_ALL_LINUX: >-
            sccache_arch="$(uname -m)"
            && curl -fsSL -o /tmp/sccache.tar.gz
            "https://github.com/mozilla/sccache/releases/download/v0.16.0/sccache-v0.16.0-${sccache_arch}-unknown-linux-musl.tar.gz"
            && tar -xzf /tmp/sccache.tar.gz -C /tmp
            && install -m 0755 "/tmp/sccache-v0.16.0-${sccache_arch}-unknown-linux-musl/sccache" /usr/local/bin/sccache
          CIBW_ENVIRONMENT_LINUX: >-
            CXX="sccache g++"
            SCCACHE_GHA_ENABLED=true
          CIBW_ENVIRONMENT_PASS_LINUX: >-
            ACTIONS_CACHE_SERVICE_V2
            ACTIONS_RESULTS_URL
            ACTIONS_RUNTIME_TOKEN
          CIBW_ENVIRONMENT_MACOS: >-
            CXX="sccache /usr/bin/clang++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_CACHE_SERVICE_V2="$ACTIONS_CACHE_SERVICE_V2"
            ACTIONS_RESULTS_URL="$ACTIONS_RESULTS_URL"
            ACTIONS_RUNTIME_TOKEN="$ACTIONS_RUNTIME_TOKEN"
            MACOSX_DEPLOYMENT_TARGET=${{ env.MACOS_DEPLOYMENT_TARGET }}
            CPPFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"
          # See the release build-wheels job: cl.exe ignores CXX, so route it
          # through sccache with setup.py's MSVC launcher instead.
          CIBW_ENVIRONMENT_WINDOWS: >-
            INFOMAP_MSVC_COMPILER_LAUNCHER=sccache
            SCCACHE_GHA_ENABLED=true
            ACTIONS_CACHE_SERVICE_V2="$ACTIONS_CACHE_SERVICE_V2"
            ACTIONS_RESULTS_URL="$ACTIONS_RESULTS_URL"
            ACTIONS_RUNTIME_TOKEN="$ACTIONS_RUNTIME_TOKEN"

      - name: Upload prerelease wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-prerelease-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 7

  verify-release-artifacts:
    if: inputs.build-release-artifacts && inputs.features == ''
    needs: [sdist, build-wheels]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: artifacts/sdist

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: artifacts/wheels
          merge-multiple: true

      - name: Smoke test sdist
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install artifacts/sdist/*.tar.gz
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY

      - name: Verify wheel artifacts are present
        run: |
          find artifacts/wheels -name '*.whl' | sort
          wheel_count="$(find artifacts/wheels -name '*.whl' | wc -l | tr -d ' ')"
          [ "$wheel_count" -gt 0 ]
        shell: bash
