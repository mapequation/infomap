name: _Python Package

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""
      run-tests:
        required: false
        type: boolean
        default: true
      build-release-artifacts:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  swig-freshness:
    if: inputs.run-tests
    name: Python SWIG freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install SWIG 4.4.1
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl build-essential libpcre2-dev
          curl -L --retry 3 --output /tmp/swig.tar.gz \
            https://downloads.sourceforge.net/project/swig/swig/swig-4.4.1/swig-4.4.1.tar.gz
          mkdir -p /tmp/swig-src
          tar -xzf /tmp/swig.tar.gz -C /tmp/swig-src --strip-components=1
          cd /tmp/swig-src
          ./configure
          make -j"$(nproc)"
          sudo make install
          swig -version

      - name: Verify tracked SWIG outputs
        run: make test-python-swig-freshness

  tests:
    if: inputs.run-tests
    name: Python ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: swig-freshness
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.11"
            smoke-only: false
            run-full-suite: false
            use-make-python-build: true
          - os: ubuntu-24.04
            python-version: "3.12"
            smoke-only: false
            run-full-suite: false
            use-make-python-build: true
          - os: ubuntu-24.04
            python-version: "3.13"
            smoke-only: false
            run-full-suite: false
            use-make-python-build: true
          - os: ubuntu-24.04
            python-version: "3.14"
            smoke-only: false
            run-full-suite: true
            use-make-python-build: true
          - os: windows-2025
            python-version: "3.14"
            smoke-only: true
            run-full-suite: false
            use-make-python-build: false

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel

      - name: Build Python wheel from repo root
        if: matrix.use-make-python-build
        run: make build-python

      - name: Build Python wheel directly
        if: ${{ !matrix.use-make-python-build }}
        env:
          OPENMP: "0"
        run: python -m build --wheel --outdir dist/python .

      - name: Install editable package
        if: matrix.use-make-python-build
        run: make dev-python-install

      - name: Install editable package directly
        if: ${{ !matrix.use-make-python-build }}
        env:
          OPENMP: "0"
        run: python -m pip install -e ".[test,docs,examples]"

      - name: Run Python smoke test
        if: matrix.smoke-only
        run: |
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY

      - name: Run Python unit tests
        if: ${{ !matrix.smoke-only }}
        run: make test-python-unit

      - name: Run Python doctests
        if: matrix.run-full-suite
        run: make test-python-doctest

      - name: Run Python example smoke tests
        if: matrix.run-full-suite
        run: make test-python-examples

  release-smoke:
    if: inputs.run-tests
    name: Python release smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel

      - name: Build release distributions
        run: make release-python-dist

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-wheel-smoke
          . .venv-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/python/*.whl
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY
        shell: bash

      - name: Smoke test built sdist
        run: |
          python -m venv .venv-sdist-smoke
          . .venv-sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/python/*.tar.gz
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY
        shell: bash

  sdist:
    if: inputs.build-release-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel
          python -m build --sdist --outdir dist/python .

      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-sdist
          path: dist/python/*.tar.gz
          retention-days: 7

  build-wheels:
    if: inputs.build-release-artifacts
    name: Python wheel ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.1

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: brew install libomp

      - name: Build wheels
        run: python -m cibuildwheel . --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux* pp*"
          CIBW_ENVIRONMENT_MACOS: >-
            CXX=/usr/bin/clang++
            MACOSX_DEPLOYMENT_TARGET=15.0
            CPPFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"

      - name: Smoke test representative wheel
        run: |
          python -m venv .venv-wheel
          if [ "${{ runner.os }}" = "Windows" ]; then
            venv_python=".venv-wheel/Scripts/python.exe"
          else
            venv_python=".venv-wheel/bin/python"
          fi
          wheel="$(find wheelhouse -maxdepth 1 -name '*cp314*.whl' | head -n 1)"
          [ -n "$wheel" ]
          "$venv_python" -m pip install --upgrade pip
          "$venv_python" -m pip install "$wheel"
          "$venv_python" - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY
        shell: bash

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 7

  verify-release-artifacts:
    if: inputs.build-release-artifacts
    needs: [sdist, build-wheels]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: artifacts/sdist

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: artifacts/wheels
          merge-multiple: true

      - name: Smoke test sdist
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install artifacts/sdist/*.tar.gz
          python - <<'PY'
          from infomap import Infomap
          print(Infomap(silent=True).num_top_modules)
          PY

      - name: Verify wheel artifacts are present
        run: |
          find artifacts/wheels -name '*.whl' | sort
          wheel_count="$(find artifacts/wheels -name '*.whl' | wc -l | tr -d ' ')"
          [ "$wheel_count" -gt 0 ]
        shell: bash
