name: Prerelease

on:
  push:
    tags:
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build.
        required: false
        type: string
        default: ""
      features:
        description: Space- or comma-separated compile-time features.
        required: false
        type: string
        default: regularized-multilayer
      publish:
        description: Publish feature wheel artifacts to PyPI.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: prerelease-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.sha) || github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.features || 'tag' }}
  cancel-in-progress: false

jobs:
  validate-prerelease-tag:
    name: Validate prerelease tag
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Validate tag format
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta)\.[0-9]+$ ]]; then
            echo "Expected prerelease tag vX.Y.Z-rc.N or vX.Y.Z-beta.N, got: $RELEASE_TAG" >&2
            exit 1
          fi

  python:
    needs: [validate-prerelease-tag]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.validate-prerelease-tag.result == 'success') }}
    uses: ./.github/workflows/_python-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.sha) || github.ref }}
      run-tests: true
      mode: full
      build-release-artifacts: true
      features: ${{ github.event_name == 'workflow_dispatch' && inputs.features || '' }}

  javascript:
    needs: [validate-prerelease-tag]
    if: ${{ needs.validate-prerelease-tag.result == 'success' }}
    uses: ./.github/workflows/_js-package.yml
    with:
      ref: ${{ github.ref }}
      run-tests: true
      pack-artifact: true

  publish-pypi:
    name: Publish prerelease to PyPI
    if: github.event_name == 'push'
    needs: [python, javascript]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi-prerelease
      url: https://pypi.org/project/infomap/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: dist/python

      - name: Download Python wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: dist/python
          merge-multiple: true

      - name: Verify Python distributions
        run: ls -la dist/python

      - name: Publish prerelease package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/python
          attestations: true

  publish-feature-pypi:
    name: Publish feature prerelease wheels to PyPI
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [python]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi-prerelease
      url: https://pypi.org/project/infomap/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: dist/python
          merge-multiple: true

      - name: Verify Python wheels
        run: |
          find dist/python -maxdepth 1 -name '*.whl' -print | sort
          wheel_count="$(find dist/python -maxdepth 1 -name '*.whl' | wc -l | tr -d ' ')"
          [ "$wheel_count" -gt 0 ]

      - name: Publish feature prerelease wheels to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/python
          attestations: true

  publish-npm:
    name: Publish prerelease to npm
    if: github.event_name == 'push'
    needs: [python, javascript]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: npm-prerelease
      url: https://www.npmjs.com/package/@mapequation/infomap
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download npm package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist/npm

      - name: Publish npm prerelease package
        run: npm publish --provenance --tag next --access public dist/npm/*.tgz
