name: _Fuzz dry-run (TEMP)

# TEMPORARY: validates `make fuzz` on Linux for this branch. Deleted before merge.
on:
  push:
    branches: [worktree-parser-fuzzing]

permissions:
  contents: read

jobs:
  dryrun:
    name: Fuzz dry-run
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build and run the intake fuzzer
        run: make fuzz FUZZ_SECONDS=90

      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-dryrun-findings
          path: |
            build/fuzz/crash-*
            build/fuzz/timeout-*
            build/fuzz/leak-*
            build/fuzz/oom-*
          if-no-files-found: ignore
