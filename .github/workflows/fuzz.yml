name: Fuzz

# Non-blocking early warning: fuzz the network intake for crashes / sanitizer
# reports on malformed input. A separate workflow (nothing depends on it) so it
# never gates PRs, but it goes RED when a reproducer is found. Mirrors the
# non-blocking pattern of python-prerelease-check.yml -- do NOT add
# continue-on-error, that would mask the alert.
on:
  schedule:
    - cron: "0 5 * * 2" # Tuesdays 05:00 UTC (clear of the Monday crons)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fuzz-intake:
    name: Fuzz network intake
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang
        # libclang-rt-dev ships the libFuzzer/ASAN runtime archives the fuzz
        # target links. It is only a Recommends of clang: runners install
        # Recommends today, but that is not a contract, so name it explicitly.
        # The unversioned metapackage tracks the image's default clang.
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-rt-dev

      # The evolved corpus compounds across the weekly runs instead of
      # restarting from the fixture seeds every time. Restore latest, save
      # under a per-run key.
      - name: Restore fuzz corpus
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      - name: Build and run the intake fuzzer
        run: make fuzz FUZZ_SECONDS=300

      # always(): a red run means the fuzzer found something -- exactly the
      # corpus worth keeping. The hashFiles guard skips the save when the job
      # failed before the corpus existed (e.g. a build failure).
      - name: Save fuzz corpus
        if: always() && hashFiles('build/fuzz/corpus/**') != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}

      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-findings
          path: |
            build/fuzz/crash-*
            build/fuzz/timeout-*
            build/fuzz/leak-*
            build/fuzz/oom-*
          if-no-files-found: ignore
          retention-days: 14

  # Non-blocking workflow: surface a scheduled failure (a reproducer was found)
  # as a tracking issue so it is not lost in the Actions tab. Only fires for
  # cron runs -- a manual dispatch failure is seen by whoever triggered it.
  report-failure:
    name: Report scheduled failure
    needs: [fuzz-intake]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Open or update the tracking issue
        uses: ./.github/actions/report-cron-failure
        with:
          workflow-name: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ github.token }}
