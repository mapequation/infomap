name: _R Package

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""
      run-tests:
        required: false
        type: boolean
        default: true
      full-matrix:
        # When false, the tests job runs only the current R release, not oldrel.
        # ci.yml sets this false on pull_request to halve the R matrix (oldrel is
        # still covered on every push to master); everything else gets both.
        required: false
        type: boolean
        default: true
      build-release-artifacts:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  swig-freshness:
    name: R SWIG freshness
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Cache SWIG 4.4.1 install
        id: swig-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.tool_cache }}/swig/4.4.1/${{ runner.arch }}
          key: swig-4.4.1-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Install SWIG 4.4.1
        if: steps.swig-cache.outputs.cache-hit != 'true'
        run: |
          swig_prefix="$RUNNER_TOOL_CACHE/swig/4.4.1/$RUNNER_ARCH"
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl build-essential libpcre2-dev
          curl -L --retry 3 --output /tmp/swig.tar.gz \
            https://downloads.sourceforge.net/project/swig/swig/swig-4.4.1/swig-4.4.1.tar.gz
          mkdir -p /tmp/swig-src
          tar -xzf /tmp/swig.tar.gz -C /tmp/swig-src --strip-components=1
          cd /tmp/swig-src
          ./configure --prefix="$swig_prefix"
          make -j"$(nproc)"
          make install

      - name: Add SWIG to PATH
        run: echo "$RUNNER_TOOL_CACHE/swig/4.4.1/$RUNNER_ARCH/bin" >> "$GITHUB_PATH"

      - name: Verify SWIG version
        run: swig -version

      - name: Verify tracked SWIG outputs
        run: make test-r-swig-freshness

  tests:
    if: inputs.run-tests
    name: R ${{ matrix.r }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: swig-freshness
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025-vs2026]
        # oldrel only when full-matrix is set (push/dispatch/release); PRs run
        # release alone to keep this at 3 jobs -- the Windows leg is the CI
        # critical path. oldrel regressions surface on the next push to master.
        r: ${{ inputs.full-matrix && fromJSON('["release", "oldrel"]') || fromJSON('["release"]') }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install libomp
          mkdir -p ~/.R
          {
            printf 'CPPFLAGS += -I%s/include\n' "$(brew --prefix libomp)"
            printf 'LDFLAGS  += -L%s/lib\n' "$(brew --prefix libomp)"
          } >> ~/.R/Makevars

      - name: Set up Python (for staging script)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          working-directory: interfaces/R/infomap
          extra-packages: |
            any::testthat
            any::igraph
            any::knitr
            any::rmarkdown
            any::tibble
            any::rcmdcheck

      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: r-${{ matrix.os }}-${{ matrix.r }}

      # Windows R builds with Rtools gcc, which setup-ccache deliberately skips
      # (it only persists the Linux/macOS ccache dirs). That left the Windows
      # R CMD check recompiling the ~25-TU C++ core from scratch every run
      # (~9 min, vs ~2 min where ccache is warm) -- the CI critical path. sccache
      # with the GitHub Actions cache backend caches those compiles across runs
      # the same way; Rtools gcc honors a launcher prefix through the package
      # Makevars (the same launcher branch mk/r.mk uses for ccache on non-macOS
      # unix), so pointing CCACHE_BIN at sccache is all the build needs.
      - name: Set up sccache (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Start the server explicitly, at the top level, in the GHA-cache env. R's
      # compiles run deeply nested (R CMD check -> INSTALL -> make -> sccache);
      # if the very first sccache call has to spawn the server from down there it
      # silently falls back to running g++ directly (no caching). sccache-action
      # exports the ACTIONS_* tokens but not the enable flag, so set it here (and
      # again on the build, insurance against an idle-timeout restart) -- without
      # it sccache uses local disk, which does not persist across runs.
      - name: Start sccache server (Windows)
        if: startsWith(matrix.os, 'windows')
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: sccache --start-server

      - name: Stage and check the package
        env:
          SCCACHE_GHA_ENABLED: ${{ startsWith(matrix.os, 'windows') && 'true' || '' }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            make test-r CCACHE_BIN=sccache USE_CCACHE=1
          else
            make test-r
          fi
          command -v ccache >/dev/null 2>&1 && ccache -s || true
          command -v sccache >/dev/null 2>&1 && sccache --show-stats || true

  build-source:
    if: inputs.build-release-artifacts
    name: R source tarball
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: swig-freshness

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          working-directory: interfaces/R/infomap
          extra-packages: |
            any::knitr
            any::rmarkdown
            any::igraph

      - name: Build source tarball
        run: make build-r

      - name: Upload R source tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r-source
          path: dist/R/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  build-binaries:
    if: inputs.build-release-artifacts
    name: R binary ${{ matrix.os }} / ${{ matrix.r }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs: build-source
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025-vs2026]
        r: [release, oldrel]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install macOS OpenMP runtime
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install libomp
          mkdir -p ~/.R
          {
            printf 'CPPFLAGS += -I%s/include\n' "$(brew --prefix libomp)"
            printf 'LDFLAGS  += -L%s/lib\n' "$(brew --prefix libomp)"
          } >> ~/.R/Makevars

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          working-directory: interfaces/R/infomap

      - name: Download R source tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: r-source
          path: dist/R

      # Cache the platform-binary compile the same way the tests job does: ccache
      # on macOS, sccache (GitHub Actions backend) on Windows Rtools gcc, which
      # setup-ccache skips. build-r-binary-from-tarball drives R CMD INSTALL
      # --build through the same mk/r.mk launcher machinery as make test-r, so
      # the wiring is identical. Windows sccache entries are content-addressed,
      # so this leg reuses the tests job's compiles of the same core for free.
      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: r-binary-${{ matrix.os }}-${{ matrix.r }}

      - name: Set up sccache (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      # Start the server explicitly, in the GHA-cache env, before the build: R's
      # nested compiles otherwise spawn it too late and fall back to plain g++.
      # sccache-action exports the ACTIONS_* tokens but not the enable flag.
      - name: Start sccache server (Windows)
        if: startsWith(matrix.os, 'windows')
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: sccache --start-server

      - name: Build platform binary
        env:
          SCCACHE_GHA_ENABLED: ${{ startsWith(matrix.os, 'windows') && 'true' || '' }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            make build-r-binary-from-tarball CCACHE_BIN=sccache USE_CCACHE=1
          else
            make build-r-binary-from-tarball
          fi
          command -v ccache >/dev/null 2>&1 && ccache -s || true
          command -v sccache >/dev/null 2>&1 && sccache --show-stats || true

      - name: Compute platform tag
        id: platform
        run: |
          case "$(uname -s)" in
            Linux*)  tag=linux ;;
            Darwin*) tag=macos ;;
            MINGW*|MSYS*|CYGWIN*) tag=windows ;;
            *) tag=unknown ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Rename R binary
        env:
          PLATFORM_TAG: ${{ steps.platform.outputs.tag }}
          R_FLAVOR: ${{ matrix.r }}
        run: |
          set -euo pipefail
          version="$(awk '/^Version:/ {print $2}' interfaces/R/infomap/DESCRIPTION)"
          case "$PLATFORM_TAG" in
            macos) ext=tgz ;;
            windows) ext=zip ;;
            *) echo "Unsupported R binary platform: $PLATFORM_TAG" >&2; exit 1 ;;
          esac
          src="dist/R/infomap_${version}.${ext}"
          dest="dist/R/infomap_${version}-r${R_FLAVOR}-${PLATFORM_TAG}.${ext}"
          test -f "$src"
          mv "$src" "$dest"
          echo "Renamed $src to $dest"

      - name: Upload R binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: r-binary-${{ steps.platform.outputs.tag }}-r${{ matrix.r }}
          path: dist/R/infomap_*-r${{ matrix.r }}-${{ steps.platform.outputs.tag }}.*
          retention-days: 7
          if-no-files-found: error

  r-universe-simulation:
    if: inputs.run-tests
    name: R r-universe simulation
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: swig-freshness

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up R
        uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          working-directory: interfaces/R/infomap
          extra-packages: |
            any::testthat
            any::igraph
            any::knitr
            any::rmarkdown
            any::tibble

      - name: Set up ccache
        uses: ./.github/actions/setup-ccache
        with:
          key-prefix: r-universe-ubuntu-24.04

      - name: Simulate r-universe package build
        run: |
          set -euo pipefail
          # This job compiles the C++ core twice from clean (the R CMD build
          # vignette install and R CMD INSTALL), uncached, which made it the R
          # workflow's critical path. Route both through ccache via the personal
          # Makevars, the same launcher trick mk/r.mk uses for `make test-r`.
          # Both compiles happen in fresh temp dirs, so CCACHE_NOHASHDIR=1 is
          # required for the entries to be reused across runs.
          mkdir -p ~/.R
          {
            printf 'CC = ccache %s\n' "$(R CMD config CC)"
            printf 'CXX = ccache %s\n' "$(R CMD config CXX)"
            printf 'CXX17 = ccache %s\n' "$(R CMD config CXX17)"
          } > ~/.R/Makevars
          export CCACHE_NOHASHDIR=1
          rm -f interfaces/R/infomap/src/infomap_wrap.cpp
          (
            cd interfaces/R/infomap
            Rscript bootstrap.R
            R CMD build --no-manual .
          )
          mkdir -p build/R/r-universe-simulation
          mv interfaces/R/infomap/infomap_*.tar.gz build/R/r-universe-simulation/
          tarball="$(find build/R/r-universe-simulation -maxdepth 1 -name 'infomap_*.tar.gz' -print -quit)"
          test -n "$tarball"
          # The source tarball must be source-only. R CMD build renders vignettes
          # via a temporary install that compiles the C++ core in-tree; without
          # the package's cleanup script those host .o/.so objects get packed and
          # break r-universe/CRAN binary builds on foreign toolchains. Fail loud
          # here rather than waiting for the downstream binary build to break.
          if compiled="$(tar tzf "$tarball" | grep -E '\.(o|so|dll|dylib)$')"; then
            echo "ERROR: source tarball contains compiled objects:" >&2
            echo "$compiled" >&2
            echo "The package cleanup script should have removed these." >&2
            exit 1
          fi
          R CMD INSTALL "$tarball"
          Rscript -e 'library(testthat); library(infomap); testthat::test_dir("interfaces/R/infomap/tests/testthat")'
          command -v ccache >/dev/null 2>&1 && ccache -s || true
