name: Nightly Quality

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-correctness:
    name: C++ correctness ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cxx: g++
          - os: macos-15
            cxx: clang++
          - os: windows-2025
            cxx: g++

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure macOS OpenMP environment
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install libomp
          make ci-github-env >> "$GITHUB_ENV"
        shell: bash

      - name: Verify toolchain
        run: |
          cmake --version
          ctest --version
          ${{ matrix.cxx }} --version
        shell: bash

      - name: Configure C++ tests
        run: |
          cmake -S . -B build/cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DINFOMAP_EXTRA_CXX_FLAGS="${CPPFLAGS}" \
            -DINFOMAP_EXTRA_LINK_FLAGS="${LDFLAGS}"
        shell: bash

      - name: Build C++ tests
        run: cmake --build build/cmake --target infomap_cpp_tests --parallel
        shell: bash

      - name: Run C++ tests
        run: ctest --test-dir build/cmake --output-on-failure
        shell: bash

  python-correctness:
    name: Python correctness ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_dev.txt

      - name: Install Ubuntu system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
        shell: bash

      - name: Install macOS system dependencies
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install swig libomp
          make ci-github-env >> "$GITHUB_ENV"
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_dev.txt
        shell: bash

      - name: Build and install local Python package
        run: |
          make python
          make py-local-install
        shell: bash

      - name: Run Python nightly correctness suite
        run: python -m pytest -m "not slow and not perf" test/python
        shell: bash

  linux-sanitizers:
    name: Linux sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install sanitizer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build
        shell: bash

      - name: Configure sanitizer build
        run: |
          cmake -S . -B build/cmake-sanitizers -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DINFOMAP_USE_OPENMP=OFF \
            -DINFOMAP_ENABLE_SANITIZERS=ON
        shell: bash

      - name: Build sanitizer tests
        run: cmake --build build/cmake-sanitizers --target infomap_cpp_tests --parallel
        shell: bash

      - name: Run sanitizer tests
        run: ctest --test-dir build/cmake-sanitizers --output-on-failure
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1

  python-benchmarks:
    name: Python benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig
        shell: bash

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_dev.txt
        shell: bash

      - name: Build and install local Python package
        run: |
          make python
          make py-local-install
        shell: bash

      - name: Run Python benchmarks
        run: |
          python scripts/benchmarks/run_python_benchmarks.py \
            --output build/benchmarks/python-benchmarks.json \
            --summary build/benchmarks/summary.md
          cat build/benchmarks/summary.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-benchmarks
          path: build/benchmarks/python-benchmarks.json
          retention-days: 14
