name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      policy: ${{ steps.filter.outputs.policy }}
      native: ${{ steps.filter.outputs.native }}
      python: ${{ steps.filter.outputs.python }}
      javascript: ${{ steps.filter.outputs.javascript }}
      r: ${{ steps.filter.outputs.r }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.2
        with:
          filters: |
            policy:
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "interfaces/swig/**"
              - "interfaces/R/generated/**"
              - "scripts/check_cpp_stream_policy.py"
              - ".github/workflows/ci.yml"
            native:
              - ".clang-format"
              - ".clang-tidy"
              - "CMakePresets.json"
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
            python:
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
              - "pyproject.toml"
              - "setup.py"
              - "interfaces/python/**"
              - "examples/python/**"
              - "examples/networks/**"
              - "test/python/**"
              - "scripts/build_config.py"
              - "scripts/generate_python_swig.py"
              - ".github/actions/setup-python-build/action.yml"
              - ".github/workflows/_python-package.yml"
            javascript:
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
              - "package.json"
              - "package-lock.json"
              - "interfaces/js/**"
              - "scripts/generate_js_metadata.py"
              - "scripts/prepare_npm_package.py"
              - ".github/actions/setup-js-build/action.yml"
              - ".github/workflows/_js-package.yml"
            r:
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "interfaces/swig/**"
              - "interfaces/R/**"
              - "examples/R/**"
              - "scripts/generate_r_swig.py"
              - "scripts/stage_r_package.py"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_r-package.yml"

  policy:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.policy == 'true'
    name: C++ stream policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check runtime stream policy
        run: make test-cpp-stream-policy PYTHON=python3

  cxx-format:
    needs: changes
    # Temporarily disabled while compilation warnings are being addressed (see #479).
    if: false
    name: C++ formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
        shell: bash

      - name: Check C++ formatting
        run: make format-native-check

  native:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    uses: ./.github/workflows/_native-build.yml

  python:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python == 'true'
    uses: ./.github/workflows/_python-package.yml
    with:
      run-tests: true
      build-release-artifacts: false

  javascript:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.javascript == 'true'
    uses: ./.github/workflows/_js-package.yml
    with:
      run-tests: true
      pack-artifact: false

  r:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.r == 'true'
    uses: ./.github/workflows/_r-package.yml
    with:
      run-tests: true
      build-release-artifacts: false

  ci-summary:
    name: CI Summary
    needs: [changes, policy, cxx-format, native, python, javascript, r]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check CI results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'
