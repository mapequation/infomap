name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Cancel superseded runs on PRs, but never on master: cancelling a master
  # run marks its CI Summary as failed, leaving a permanent red X on that
  # commit (ci-auto-rerun only retries setup-phase flakes, not cancellations).
  # Pushes (master only, see `on:`) also get a per-sha group: a shared group
  # holds at most one *queued* run, so a merge burst still cancelled the middle
  # commits' runs while they waited (runs 1514-1516) -- the same red X, and a
  # run verify-master-ci (release.yml) refuses to publish from.
  group: ci-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      policy: ${{ steps.filter.outputs.policy }}
      native: ${{ steps.filter.outputs.native }}
      python-core: ${{ steps.filter.outputs.python-core }}
      python-packaging: ${{ steps.filter.outputs.python-packaging }}
      python-swig: ${{ steps.filter.outputs.python-swig }}
      javascript: ${{ steps.filter.outputs.javascript }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
      docker: ${{ steps.filter.outputs.docker }}
      notebooks: ${{ steps.filter.outputs.notebooks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3.0.2
        with:
          filters: .github/filters.yml

  pre-commit:
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch'
      || needs.changes.outputs.policy == 'true'
      || needs.changes.outputs.native == 'true'
      || needs.changes.outputs.python-core == 'true'
      || needs.changes.outputs.python-packaging == 'true'
      || needs.changes.outputs.python-swig == 'true'
      || needs.changes.outputs.javascript == 'true'
      || needs.changes.outputs.r == 'true'
    name: pre-commit
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      # Air (R formatter) for the air-format hook. Pinned to the canonical
      # version documented in AGENTS.md so local and CI formatting agree: Air is
      # pre-1.0 and, with no air.toml in the repo, its output is version-
      # dependent. Bump this pin and the AGENTS.md note together.
      - name: Set up Air
        uses: posit-dev/setup-air@cf390573ff4fe0f198f35df3a642b1409328d859 # v1.0.1
        with:
          version: "0.9.0"

      # actionlint for the `actionlint` pre-commit hook. Downloading the pinned
      # release binary keeps the gate fast (no Go build). ubuntu runners already
      # ship shellcheck, which actionlint uses to lint embedded run: scripts.
      # Bump this pin and the AGENTS.md note together.
      - name: Set up actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin actionlint
          actionlint -version

      # Run the repo's own pre-commit config so local hooks and CI agree. This
      # also restores C++ formatting enforcement (the old cxx-format job was
      # disabled per #479): the clang-format hook is scoped to the same src/
      # tree as `make format-native-check` and pins clang-format 20.1.7. The
      # air-format hook runs `make format-r-check` against the Air installed by
      # the setup-air step above.
      # Skipped hooks:
      #   - biome-lint/biome-format: the javascript job already runs them via
      #     `make test-js`.
      # The pre-push-staged pyright-core hook is not triggered by run --all-files.
      - name: Run pre-commit hooks
        env:
          SKIP: biome-lint,biome-format
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  sanitizers:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    name: Linux sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install sanitizer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build
        shell: bash

      - name: Install Python test helpers
        run: python -m pip install --upgrade "jsonschema>=4.18" referencing
        shell: bash

      - name: Configure sanitizer build
        run: make test-sanitizers CMAKE_GENERATOR=Ninja SANITIZER_CXX=clang++ SANITIZER_CMAKE_ARGS="-DPython3_EXECUTABLE=$(python -c 'from pathlib import Path; import sys; print(Path(sys.executable).as_posix())')"
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1

  clang-tidy:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    name: Linux clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang-tidy toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ninja-build
        shell: bash

      - name: Run clang-tidy
        run: make tidy-native CMAKE_DEV_GENERATOR=Ninja CLANG_TIDY_WARNINGS_AS_ERRORS='readability-*,performance-*,modernize-use-override,bugprone-branch-clone'
        shell: bash

  native:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    uses: ./.github/workflows/_native-build.yml

  python:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-core == 'true' || needs.changes.outputs.python-swig == 'true'
    uses: ./.github/workflows/_python-package.yml
    with:
      run-tests: true
      mode: ${{ github.event_name == 'pull_request' && 'quick' || 'full' }}
      run-swig-freshness: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-swig == 'true' }}
      run-release-smoke: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-packaging == 'true' }}
      build-release-artifacts: false

  notebooks:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.notebooks == 'true' || (github.event_name == 'push' && needs.changes.outputs.python-core == 'true')
    name: Tutorial notebook smoke tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"
          install-build-tooling: "true"

      - name: Install package and notebook dependencies
        run: |
          make build-python
          make dev-python-install
          make dev-python-notebooks-install

      - name: Build native Infomap for HPC notebook
        run: make build-native

      - name: Run notebook smoke tests
        run: make test-python-notebooks-smoke

  javascript:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.javascript == 'true'
    uses: ./.github/workflows/_js-package.yml
    with:
      run-tests: true
      pack-artifact: false

  r:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.r == 'true'
    uses: ./.github/workflows/_r-package.yml
    with:
      run-tests: true
      # Run oldrel on push/dispatch, but only the current release on PRs -- halves
      # the R matrix (and drops a Windows R leg, the CI critical path) per PR;
      # oldrel is still exercised on every push to master.
      full-matrix: ${{ github.event_name != 'pull_request' }}
      build-release-artifacts: false

  docs:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Build native Infomap for HPC notebook
        run: make build-native

      - name: Build docs
        run: make build-docs

  docker:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and smoke-test supported Docker images
        run: make test-docker-supported

  ci-summary:
    name: CI Summary
    needs: [changes, pre-commit, sanitizers, clang-tidy, native, python, notebooks, javascript, r, docs, docker]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check CI results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'
