name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      policy: ${{ steps.filter.outputs.policy }}
      native: ${{ steps.filter.outputs.native }}
      python-core: ${{ steps.filter.outputs.python-core }}
      python-packaging: ${{ steps.filter.outputs.python-packaging }}
      python-swig: ${{ steps.filter.outputs.python-swig }}
      javascript: ${{ steps.filter.outputs.javascript }}
      r: ${{ steps.filter.outputs.r }}
      docs: ${{ steps.filter.outputs.docs }}
      docker: ${{ steps.filter.outputs.docker }}
      notebooks: ${{ steps.filter.outputs.notebooks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3.0.2
        with:
          filters: |
            policy:
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "interfaces/swig/**"
              - "interfaces/R/generated/**"
              - "scripts/check_cpp_stream_policy.py"
              - ".github/workflows/ci.yml"
            native:
              - ".clang-format"
              - ".clang-tidy"
              - "CMakePresets.json"
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/scripts/**"
              - "test/schemas/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
            python-core:
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
              - "pyproject.toml"
              - "setup.py"
              - "interfaces/swig/**"
              - "interfaces/python/**"
              - "examples/python/**"
              - "examples/notebooks/**"
              - "examples/networks/**"
              - "test/python/**"
              - "test/scripts/**"
              - "test/schemas/**"
              - "scripts/build_config.py"
              - "scripts/generate_python_swig.py"
              - "scripts/notebook_manifest.py"
              - ".github/actions/setup-python-build/action.yml"
              - ".github/workflows/_python-package.yml"
            python-packaging:
              - "Makefile"
              - "mk/**"
              - "pyproject.toml"
              - "setup.py"
              - "scripts/build_config.py"
              - ".github/actions/setup-python-build/action.yml"
              - ".github/workflows/_python-package.yml"
            python-swig:
              - "interfaces/swig/**"
              - "interfaces/python/generated/**"
              - "interfaces/python/src/infomap/_swig.py"
              - "scripts/generate_python_swig.py"
              - ".github/workflows/_python-package.yml"
            javascript:
              - "CMakeLists.txt"
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "test/cpp/**"
              - "test/fixtures/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_native-build.yml"
              - "package.json"
              - "package-lock.json"
              - "interfaces/js/**"
              # The binding-options freshness gate runs in the JS workflow, so
              # changes to the generator or its inputs must trigger it.
              - "interfaces/parameters/**"
              - "scripts/generate_binding_options.py"
              - "scripts/parameter_catalog.py"
              - "scripts/generate_js_metadata.py"
              - "scripts/prepare_npm_package.py"
              - ".github/actions/setup-js-build/action.yml"
              - ".github/workflows/_js-package.yml"
            r:
              - "Makefile"
              - "mk/**"
              - "src/**"
              - "interfaces/swig/**"
              - "interfaces/R/**"
              - "examples/R/**"
              - "scripts/generate_r_swig.py"
              - "scripts/stage_r_package.py"
              - ".github/workflows/ci.yml"
              - ".github/workflows/_r-package.yml"
            docs:
              - "README.rst"
              - "BUILD.md"
              - "Makefile"
              - "mk/**"
              - "pyproject.toml"
              - "setup.py"
              - "examples/notebooks/**"
              - "scripts/build_config.py"
              - "scripts/notebook_manifest.py"
              - "interfaces/python/**"
              - "src/**"
              - ".github/actions/setup-python-build/action.yml"
            docker:
              - "docker/**"
              - "docker-compose.yml"
              - ".dockerignore"
              - "Makefile"
              - "mk/**"
              - "pyproject.toml"
              - "setup.py"
              - "examples/notebooks/**"
              - "src/**"
              - "interfaces/python/**"
              - "scripts/build_config.py"
              - "README.rst"
            notebooks:
              - "interfaces/python/**"
              - "test/python/**"
              - "examples/notebooks/**"
              - "scripts/notebook_manifest.py"
              - ".github/actions/setup-python-build/action.yml"
              - ".github/workflows/ci.yml"
              - ".github/workflows/notebooks.yml"

  policy:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.policy == 'true'
    name: C++ stream policy
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check runtime stream policy
        run: make test-cpp-stream-policy PYTHON=python3

  cxx-format:
    needs: changes
    # Temporarily disabled while compilation warnings are being addressed (see #479).
    # if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true' || needs.changes.outputs.policy == 'true'
    if: false
    name: C++ formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
        shell: bash

      - name: Check C++ formatting
        run: make format-native-check

  sanitizers:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    name: Linux sanitizers
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install sanitizer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build
        shell: bash

      - name: Install Python test helpers
        run: python -m pip install --upgrade "jsonschema>=4.18" referencing
        shell: bash

      - name: Configure sanitizer build
        run: make test-sanitizers CMAKE_GENERATOR=Ninja SANITIZER_CXX=clang++ SANITIZER_CMAKE_ARGS="-DPython3_EXECUTABLE=$(python -c 'from pathlib import Path; import sys; print(Path(sys.executable).as_posix())')"
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1

  clang-tidy:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    name: Linux clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang-tidy toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ninja-build
        shell: bash

      - name: Run clang-tidy
        run: make tidy-native CMAKE_DEV_GENERATOR=Ninja CLANG_TIDY_WARNINGS_AS_ERRORS='readability-*,performance-*,modernize-use-override,bugprone-branch-clone'
        shell: bash

  native:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.native == 'true'
    uses: ./.github/workflows/_native-build.yml

  python:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-core == 'true' || needs.changes.outputs.python-swig == 'true'
    uses: ./.github/workflows/_python-package.yml
    with:
      run-tests: true
      mode: ${{ github.event_name == 'pull_request' && 'quick' || 'full' }}
      run-swig-freshness: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-swig == 'true' }}
      run-release-smoke: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.python-packaging == 'true' }}
      build-release-artifacts: false

  notebooks:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.notebooks == 'true' || (github.event_name == 'push' && needs.changes.outputs.python-core == 'true')
    name: Tutorial notebook smoke tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"
          install-build-tooling: "true"

      - name: Install package and notebook dependencies
        run: |
          make build-python
          make dev-python-install
          make dev-python-notebooks-install

      - name: Build native Infomap for HPC notebook
        run: make build-native

      - name: Run notebook smoke tests
        run: make test-python-notebooks-smoke

  javascript:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.javascript == 'true'
    uses: ./.github/workflows/_js-package.yml
    with:
      run-tests: true
      pack-artifact: false

  r:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.r == 'true'
    uses: ./.github/workflows/_r-package.yml
    with:
      run-tests: true
      # Run oldrel on push/dispatch, but only the current release on PRs -- halves
      # the R matrix (and drops a Windows R leg, the CI critical path) per PR;
      # oldrel is still exercised on every push to master.
      full-matrix: ${{ github.event_name != 'pull_request' }}
      build-release-artifacts: false

  docs:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Build native Infomap for HPC notebook
        run: make build-native

      - name: Build docs
        run: make build-docs

  docker:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and smoke-test supported Docker images
        run: make test-docker-supported

  ci-summary:
    name: CI Summary
    needs: [changes, policy, cxx-format, sanitizers, clang-tidy, native, python, notebooks, javascript, r, docs, docker]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check CI results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'
