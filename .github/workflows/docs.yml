name: Docs

on:
  pull_request:
    paths:
      - "README.rst"
      - "BUILD.md"
      - "mk/**"
      - "pyproject.toml"
      - "setup.py"
      - "interfaces/python/**"
      - "src/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [master]
    paths:
      - "README.rst"
      - "BUILD.md"
      - "Makefile"
      - "mk/**"
      - "pyproject.toml"
      - "setup.py"
      - "interfaces/python/**"
      - "src/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip

      - name: Verify committed docs freshness
        run: make test-docs
