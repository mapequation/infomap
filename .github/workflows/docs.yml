name: Docs

on:
  pull_request:
    paths:
      - "README.rst"
      - "BUILD.md"
      - "Makefile"
      - "mk/**"
      - "pyproject.toml"
      - "setup.py"
      - "scripts/build_config.py"
      - "interfaces/python/**"
      - "src/**"
      - "docs/**"
      - ".github/actions/setup-python-build/action.yml"
      - ".github/workflows/docs.yml"
  push:
    branches: [master]
    paths:
      - "README.rst"
      - "BUILD.md"
      - "Makefile"
      - "mk/**"
      - "pyproject.toml"
      - "setup.py"
      - "scripts/build_config.py"
      - "interfaces/python/**"
      - "src/**"
      - "docs/**"
      - ".github/actions/setup-python-build/action.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"

      - name: Verify committed docs freshness
        run: make test-docs
