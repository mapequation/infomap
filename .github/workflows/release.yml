name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild and republish GitHub release assets for
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-stable-tag:
    name: Validate stable release tag
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Validate tag format
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected stable release tag vX.Y.Z, got: $RELEASE_TAG" >&2
            exit 1
          fi

  native:
    needs: [validate-stable-tag]
    uses: ./.github/workflows/_native-build.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      upload-artifacts: true

  python:
    needs: [validate-stable-tag]
    uses: ./.github/workflows/_python-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      mode: full
      build-release-artifacts: true

  javascript:
    needs: [validate-stable-tag]
    uses: ./.github/workflows/_js-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      pack-artifact: true

  r:
    needs: [validate-stable-tag]
    uses: ./.github/workflows/_r-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      build-release-artifacts: true

  publish-github-release:
    name: Publish GitHub release assets
    needs: [native, python, javascript, r]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download native release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: release-assets/native
          merge-multiple: true

      - name: Download Python release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: release-assets/python

      - name: Download Python wheel assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: release-assets/python
          merge-multiple: true

      - name: Download npm release asset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: release-assets/npm

      - name: Download R source tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: r-source
          path: release-assets/r

      - name: Download R binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: r-binary-*
          path: release-assets/r
          merge-multiple: true

      - name: List packaged assets
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release-assets/native/*.zip
            release-assets/python/**/*.tar.gz
            release-assets/python/**/*.whl
            release-assets/npm/*.tgz
            release-assets/r/infomap_*.tar.gz
            release-assets/r/infomap_*-r*-*.tgz
            release-assets/r/infomap_*-r*-*.zip

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi-release
      url: https://pypi.org/project/infomap/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: dist/python

      - name: Download Python wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: dist/python
          merge-multiple: true

      - name: Verify Python distributions
        run: ls -la dist/python

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: dist/python
          # PEP 740 attestations under trusted publishing. This is the
          # action's default; set explicitly so the intent is visible and
          # survives any future change to the default.
          attestations: true

  # Multi-arch GHCR publish, split into three stages so each architecture builds
  # on a NATIVE runner (arm64 on ubuntu-24.04-arm) instead of under QEMU
  # emulation, which made the old single job ~34 min. docker-build fans out over
  # image x platform (4 parallel jobs) and pushes each by digest; docker-publish
  # stitches the digests into the multi-arch tags. Layer caching (type=gha) is
  # scoped per image+platform so the four builds don't clobber each other.
  docker-meta:
    name: Resolve Docker release metadata
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.release.outputs.version }}
      revision: ${{ steps.release.outputs.revision }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected release tag vX.Y.Z, got: $RELEASE_TAG" >&2
            exit 1
          fi

          {
            echo "version=${RELEASE_TAG#v}"
            echo "revision=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

  docker-build:
    name: Build ${{ matrix.image }} image (${{ matrix.platform }})
    needs: [docker-meta]
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [infomap, notebook]
        platform: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          platforms: linux/${{ matrix.platform }}
          # push-by-digest: no tag yet; docker-publish assembles the tagged
          # multi-arch manifest once every arch has pushed. provenance:false keeps
          # the pushed digest a plain image manifest so imagetools can merge it.
          outputs: type=image,name=ghcr.io/mapequation/infomap,push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=docker-${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.image }}-${{ matrix.platform }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.docker-meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.docker-meta.outputs.revision }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  docker-publish:
    name: Publish ${{ matrix.image }} multi-arch image
    needs: [docker-meta, docker-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        image: [infomap, notebook]
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.image }}-amd64
          path: /tmp/digests/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.image }}-arm64
          path: /tmp/digests/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test, assemble, and verify the multi-arch image
        id: assemble
        env:
          VERSION: ${{ needs.docker-meta.outputs.version }}
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          repo=ghcr.io/mapequation/infomap
          amd64_digest="$(basename "$(ls /tmp/digests/amd64/)")"
          arm64_digest="$(basename "$(ls /tmp/digests/arm64/)")"

          # Functional smoke test of the real pushed artifact (amd64) BEFORE any
          # tag points at it -- if it fails, no tag is created and the release
          # does not ship a broken image.
          if [ "$IMAGE" = notebook ]; then
            docker run --rm "$repo@sha256:$amd64_digest" \
              python -c "from infomap import Infomap; print(Infomap(silent=True).num_top_modules)" > /dev/null
            tags=("$repo:notebook-$VERSION" "$repo:notebook")
          else
            docker run --rm "$repo@sha256:$amd64_digest" --help > /dev/null
            tags=("$repo:$VERSION" "$repo:latest")
          fi

          tag_args=()
          for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          docker buildx imagetools create "${tag_args[@]}" \
            "$repo@sha256:$amd64_digest" \
            "$repo@sha256:$arm64_digest"

          for t in "${tags[@]}"; do
            echo "Inspecting $t"
            docker buildx imagetools inspect "$t" | tee manifest.txt
            grep -q "linux/amd64" manifest.txt
            grep -q "linux/arm64" manifest.txt
          done

          # Manifest-list digest (both tags point at it) for the attestation below.
          digest="$(docker buildx imagetools inspect "${tags[0]}" --format '{{.Manifest.Digest}}')"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/mapequation/infomap
          subject-digest: ${{ steps.assemble.outputs.digest }}
          push-to-registry: true

  publish-npm:
    name: Publish to npm
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@mapequation/infomap
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download npm package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist/npm

      - name: Publish npm package
        # --provenance emits a signed npm provenance attestation via the
        # id-token: write OIDC grant above, linking the package to this
        # workflow run and commit. Requires the repository field in
        # package.json (present).
        run: npm publish --provenance --access public dist/npm/*.tgz

  notify-homebrew-infomap:
    name: Notify homebrew-infomap
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch homebrew-infomap update workflow
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_INFOMAP_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/homebrew-infomap/dispatches \
            -f event_type=infomap_release_published \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"

  notify-python-docs:
    name: Notify infomap-python-docs
    needs: [publish-pypi]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch infomap-python-docs build workflow
        env:
          GH_TOKEN: ${{ secrets.PYTHON_DOCS_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/infomap-python-docs/dispatches \
            -f event_type=infomap_release_published \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"

  notify-mapequation:
    name: Notify mapequation.github.io
    needs: [publish-npm]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch mapequation.github.io update workflow
        env:
          GH_TOKEN: ${{ secrets.MAPEQUATION_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/mapequation.github.io/dispatches \
            -f event_type=infomap_release_published \
            -f "client_payload[package]=@mapequation/infomap" \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
