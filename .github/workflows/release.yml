name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild and republish GitHub release assets for
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  native:
    uses: ./.github/workflows/_native-build.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      upload-artifacts: true

  python:
    uses: ./.github/workflows/_python-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      build-release-artifacts: true

  javascript:
    uses: ./.github/workflows/_js-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      pack-artifact: true

  r:
    uses: ./.github/workflows/_r-package.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
      run-tests: true
      build-release-artifacts: true

  publish-github-release:
    name: Publish GitHub release assets
    needs: [native, python, javascript, r]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download native release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: release-assets/native
          merge-multiple: true

      - name: Download Python release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: release-assets/python

      - name: Download Python wheel assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: release-assets/python
          merge-multiple: true

      - name: Download npm release asset
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: release-assets/npm

      - name: Download R source tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: r-source
          path: release-assets/r

      - name: Download R binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: r-binary-*
          path: release-assets/r
          merge-multiple: true

      - name: List packaged assets
        run: find release-assets -maxdepth 3 -type f | sort

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            release-assets/native/*.zip
            release-assets/python/**/*.tar.gz
            release-assets/python/**/*.whl
            release-assets/npm/*.tgz
            release-assets/r/infomap_*.tar.gz
            release-assets/r/infomap_*-r*-*.tgz
            release-assets/r/infomap_*-r*-*.zip

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi-release
      url: https://pypi.org/project/infomap/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-sdist
          path: dist/python

      - name: Download Python wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-wheels-*
          path: dist/python
          merge-multiple: true

      - name: Verify Python distributions
        run: ls -la dist/python

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/python

  publish-ghcr:
    name: Publish GHCR Docker images
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected release tag vX.Y.Z, got: $RELEASE_TAG" >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          revision="$(git rev-parse HEAD)"

          {
            echo "tag=$RELEASE_TAG"
            echo "version=$version"
            echo "revision=$revision"
          } >> "$GITHUB_OUTPUT"

      - name: Build and smoke-test supported Docker images
        run: make test-docker-supported

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish CLI image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/infomap.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mapequation/infomap:${{ steps.release.outputs.version }}
            ghcr.io/mapequation/infomap:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.release.outputs.revision }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Build and publish notebook image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/notebook.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mapequation/infomap:notebook-${{ steps.release.outputs.version }}
            ghcr.io/mapequation/infomap:notebook
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.release.outputs.revision }}
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Verify published multi-arch manifests
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          for image in \
            "ghcr.io/mapequation/infomap:$VERSION" \
            "ghcr.io/mapequation/infomap:latest" \
            "ghcr.io/mapequation/infomap:notebook-$VERSION" \
            "ghcr.io/mapequation/infomap:notebook"
          do
            echo "Inspecting $image"
            docker buildx imagetools inspect "$image" | tee manifest.txt
            grep -q "linux/amd64" manifest.txt
            grep -q "linux/arm64" manifest.txt
          done

  publish-npm:
    name: Publish to npm
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@mapequation/infomap
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download npm package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist/npm

      - name: Publish npm package
        run: npm publish --access public dist/npm/*.tgz

  notify-homebrew-infomap:
    name: Notify homebrew-infomap
    needs: [publish-github-release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch homebrew-infomap update workflow
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_INFOMAP_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/homebrew-infomap/dispatches \
            -f event_type=infomap_release_published \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"

  notify-python-docs:
    name: Notify infomap-python-docs
    needs: [publish-pypi]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch infomap-python-docs build workflow
        env:
          GH_TOKEN: ${{ secrets.PYTHON_DOCS_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/infomap-python-docs/dispatches \
            -f event_type=infomap_release_published \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"

  notify-mapequation:
    name: Notify mapequation.github.io
    needs: [publish-npm]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Dispatch mapequation.github.io update workflow
        env:
          GH_TOKEN: ${{ secrets.MAPEQUATION_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          gh api repos/mapequation/mapequation.github.io/dispatches \
            -f event_type=infomap_release_published \
            -f "client_payload[package]=@mapequation/infomap" \
            -F "client_payload[version]=$version" \
            -F "client_payload[release_tag]=$RELEASE_TAG" \
            -F "client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/$RELEASE_TAG"
