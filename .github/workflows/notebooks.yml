name: Tutorial Notebooks

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: notebooks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    name: Full tutorial notebook tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: ./.github/actions/setup-python-build
        with:
          python-version: "3.14"
          install-build-tooling: "true"

      - name: Install package and notebook dependencies
        run: |
          make build-python
          make dev-python-install
          make dev-python-notebooks-install

      - name: Build native Infomap for HPC notebook
        run: make build-native

      - name: Run full notebook suite
        run: make test-python-notebooks-full

  # Non-blocking workflow: surface a scheduled failure as a tracking issue so it
  # is not lost in the Actions tab. Only fires for cron runs -- a manual
  # dispatch failure is seen by whoever triggered it.
  report-failure:
    name: Report scheduled failure
    needs: [full]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Open or update the tracking issue
        uses: ./.github/actions/report-cron-failure
        with:
          workflow-name: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          token: ${{ github.token }}
