name: Set up JavaScript build
description: Set up Node.js, Emscripten, and npm dependencies for the JS worker.
runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24
        cache: npm

    - name: Set up Emscripten
      uses: mymindstorm/setup-emsdk@667eb33f24e84e7f362c16d8d7fff0629a73e15e # v15
      with:
        version: 5.0.5

    - name: Install JavaScript dependencies
      shell: bash
      run: npm ci
